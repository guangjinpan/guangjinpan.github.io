<script src="{{ "/assets/js/main.min.js" | relative_url }}"></script>
<script>
(function () {
  var bibCache = {};

  function fetchBib(bibSrc) {
    if (bibCache[bibSrc]) return Promise.resolve(bibCache[bibSrc]);
    return fetch(bibSrc)
      .then(function (response) {
        if (!response.ok) throw new Error("Fetch failed");
        return response.text();
      })
      .then(function (text) {
        bibCache[bibSrc] = text;
        return text;
      });
  }

  function parseBibtex(text) {
    var atIndex = (text || "").indexOf("@");
    if (atIndex < 0) return null;
    var braceOpen = text.indexOf("{", atIndex);
    if (braceOpen < 0) return null;

    var depth = 0;
    var braceClose = -1;
    for (var i = braceOpen; i < text.length; i++) {
      var ch = text[i];
      if (ch === "{") depth++;
      else if (ch === "}") {
        depth--;
        if (depth === 0) {
          braceClose = i;
          break;
        }
      }
    }
    if (braceClose < 0) return null;

    var inside = text.slice(braceOpen + 1, braceClose).trim();
    var firstComma = inside.indexOf(",");
    if (firstComma < 0) return null;
    var citeKey = inside.slice(0, firstComma).trim();
    var body = inside.slice(firstComma + 1);

    var fields = {};
    var pos = 0;

    function skipWs() {
      while (pos < body.length && /\s/.test(body[pos])) pos++;
    }

    function readUntil(predicate) {
      var start = pos;
      while (pos < body.length && !predicate(body[pos])) pos++;
      return body.slice(start, pos);
    }

    function readBalancedBraces() {
      var start = pos;
      var d = 0;
      while (pos < body.length) {
        var c = body[pos++];
        if (c === "{") d++;
        else if (c === "}") {
          d--;
          if (d === 0) break;
        }
      }
      return body.slice(start, pos);
    }

    function readQuoted() {
      var start = pos;
      pos++;
      while (pos < body.length) {
        var c = body[pos++];
        if (c === "\\" && pos < body.length) {
          pos++;
          continue;
        }
        if (c === "\"") break;
      }
      return body.slice(start, pos);
    }

    while (pos < body.length) {
      skipWs();
      if (pos >= body.length) break;
      if (body[pos] === "}") break;
      if (body[pos] === ",") {
        pos++;
        continue;
      }

      var key = readUntil(function (c) { return c === "=" || c === "\n"; }).trim();
      skipWs();
      if (body[pos] !== "=") {
        pos++;
        continue;
      }
      pos++;
      skipWs();

      var rawValue = "";
      if (body[pos] === "{") rawValue = readBalancedBraces();
      else if (body[pos] === "\"") rawValue = readQuoted();
      else rawValue = readUntil(function (c) { return c === "," || c === "\n"; });

      rawValue = (rawValue || "").trim();
      if (rawValue[0] === "{") rawValue = rawValue.slice(1, -1);
      if (rawValue[0] === "\"") rawValue = rawValue.slice(1, -1);
      rawValue = rawValue.replace(/\s+/g, " ").trim();

      if (key) fields[key.toLowerCase()] = rawValue;

      while (pos < body.length && body[pos] !== ",") pos++;
      if (body[pos] === ",") pos++;
    }

    return { citeKey: citeKey, fields: fields };
  }

  function parseBibtexEntries(text) {
    var entries = {};
    var i = 0;
    var t = text || "";

    function parseMetaBefore(atPos) {
      var meta = {};
      var pos = atPos - 1;
      while (pos >= 0) {
        var lineStart = t.lastIndexOf("\n", pos);
        lineStart = lineStart < 0 ? 0 : lineStart + 1;
        var line = t.slice(lineStart, pos + 1).trim();
        if (!line) break;
        if (line[0] !== "%") break;

        var m = line.match(/^\%\s*([A-Za-z0-9_-]+)\s*(?:[:=]\s*)(.*)$/);
        if (m) {
          var key = (m[1] || "").toLowerCase();
          var value = (m[2] || "").trim();
          if (value[0] === "{") value = value.slice(1, -1).trim();
          if (value[0] === "\"") value = value.slice(1, -1).trim();
          meta[key] = value;
        }

        pos = lineStart - 2;
      }
      return meta;
    }

    while (i < t.length) {
      var atIndex = t.indexOf("@", i);
      if (atIndex < 0) break;
      var braceOpen = t.indexOf("{", atIndex);
      if (braceOpen < 0) break;

      var depth = 0;
      var braceClose = -1;
      for (var j = braceOpen; j < t.length; j++) {
        var ch = t[j];
        if (ch === "{") depth++;
        else if (ch === "}") {
          depth--;
          if (depth === 0) {
            braceClose = j;
            break;
          }
        }
      }
      if (braceClose < 0) break;

      var entryText = t.slice(atIndex, braceClose + 1);
      var entry = parseBibtex(entryText);
      if (entry && entry.citeKey) {
        entries[entry.citeKey] = { entry: entry, raw: entryText, meta: parseMetaBefore(atIndex) };
      }

      i = braceClose + 1;
    }

    return entries;
  }

  function getBibEntryByKey(entries, key) {
    var k = (key || "").trim();
    if (!k) return null;
    if (entries[k]) return entries[k];
    var lower = k.toLowerCase();
    for (var candidate in entries) {
      if (Object.prototype.hasOwnProperty.call(entries, candidate) && candidate.toLowerCase() === lower) {
        return entries[candidate];
      }
    }
    for (var candidate2 in entries) {
      if (!Object.prototype.hasOwnProperty.call(entries, candidate2)) continue;
      var block = entries[candidate2];
      var e = block && block.entry;
      var idx = (block && block.meta ? block.meta["x_index"] : "") || (e && e.fields ? e.fields["x_index"] : "");
      if (idx && idx.toLowerCase() === lower) return entries[candidate2];
    }
    return null;
  }

  function formatAuthorName(name) {
    var n = (name || "").trim();
    if (!n) return "";
    if (/^others$/i.test(n) || /^et al\.?$/i.test(n)) return "et al.";

    if (n.indexOf(",") >= 0) {
      var parts = n.split(",");
      var last = (parts[0] || "").trim();
      var first = (parts.slice(1).join(",") || "").trim();
      var initials = first
        .split(/[\s-]+/)
        .filter(Boolean)
        .map(function (p) { return p[0].toUpperCase() + "."; })
        .join("");
      return (initials ? initials + " " : "") + last;
    }

    var words = n.split(/\s+/).filter(Boolean);
    if (words.length === 1) return words[0];
    var lastName = words[words.length - 1];
    var firstNames = words.slice(0, -1);
    var initials2 = firstNames
      .map(function (p) { return p[0].toUpperCase() + "."; })
      .join("");
    return (initials2 ? initials2 + " " : "") + lastName;
  }

  function parseAuthorList(text) {
    return (text || "")
      .split(/\s+and\s+/i)
      .map(function (a) { return (a || "").trim(); })
      .filter(Boolean);
  }

  function parseIndexList(text) {
    return (text || "")
      .split(/[,\s]+/)
      .map(function (v) { return (v || "").trim(); })
      .filter(Boolean)
      .map(function (v) { return parseInt(v, 10); })
      .filter(function (n) { return Number.isFinite(n) && n > 0; });
  }

  function nameToKey(name) {
    var n = (name || "").trim();
    if (!n) return "";
    if (/^others$/i.test(n) || /^et al\.?$/i.test(n)) return "et-al";

    var last = "";
    var first = "";
    if (n.indexOf(",") >= 0) {
      var parts = n.split(",");
      last = (parts[0] || "").trim();
      first = (parts.slice(1).join(",") || "").trim();
    } else {
      var words = n.split(/\s+/).filter(Boolean);
      last = (words[words.length - 1] || "").trim();
      first = words.slice(0, -1).join(" ").trim();
    }

    var initials = (first || "")
      .split(/[\s-]+/)
      .filter(Boolean)
      .map(function (p) { return (p[0] || "").toLowerCase(); })
      .join("");

    return (last || "").toLowerCase() + "|" + initials;
  }

  function getFieldAny(fields, keys) {
    for (var i = 0; i < keys.length; i++) {
      var v = fields[keys[i]];
      if (v) return v;
    }
    return "";
  }

  function getMetaAny(meta, keys) {
    for (var i = 0; i < keys.length; i++) {
      var v = meta ? meta[keys[i]] : "";
      if (v) return v;
    }
    return "";
  }

  function escapeHtml(s) {
    return (s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function renderBibtexCitation(entry) {
    if (!entry || !entry.fields) return "";
    var f = entry.fields;
    var meta = entry.meta || {};

    var authorsRaw = f.author || "";
    var authorParts = parseAuthorList(authorsRaw);
    var authors = authorParts
      .map(function (raw) {
        return {
          raw: raw,
          formatted: formatAuthorName(raw),
          rawKey: nameToKey(raw),
        };
      })
      .filter(function (a) { return a.formatted; });

    var correspondingSet = {};

    var boldAuthorField =
      getMetaAny(meta, ["x_bold_author", "x_highlight_author", "x_self_author"]) ||
      getFieldAny(f, ["x_bold_author", "x_highlight_author", "x_self_author"]);
    var boldAuthorIndexField =
      getMetaAny(meta, ["x_bold_author_index", "x_bold_author_indices", "x_highlight_author_index", "x_highlight_author_indices"]) ||
      getFieldAny(f, ["x_bold_author_index", "x_bold_author_indices", "x_highlight_author_index", "x_highlight_author_indices"]);

    var correspondingAuthorField =
      getMetaAny(meta, ["x_corresponding_author", "x_correspondingauthor", "corresponding_author", "correspondingauthor", "corresponding"]) ||
      getFieldAny(f, ["x_corresponding_author", "x_correspondingauthor", "corresponding_author", "correspondingauthor", "corresponding"]);
    var correspondingAuthorIndexField =
      getMetaAny(meta, ["x_corresponding_author_index", "x_corresponding_author_indices", "x_corresponding_index", "x_corresponding_indices"]) ||
      getFieldAny(f, ["x_corresponding_author_index", "x_corresponding_author_indices", "x_corresponding_index", "x_corresponding_indices"]);

    if (correspondingAuthorField) {
      parseAuthorList(correspondingAuthorField).forEach(function (n) {
        var k = nameToKey(n);
        if (k) correspondingSet[k] = true;
      });
    }

    if (correspondingAuthorIndexField) {
      parseIndexList(correspondingAuthorIndexField).forEach(function (oneBasedIndex) {
        var idx = oneBasedIndex - 1;
        if (authors[idx]) correspondingSet[authors[idx].rawKey] = true;
      });
    }

    var boldSet = {};
    if (boldAuthorField) {
      parseAuthorList(boldAuthorField).forEach(function (n) {
        var k = nameToKey(n);
        if (k) boldSet[k] = true;
      });
    } else if (boldAuthorIndexField) {
      parseIndexList(boldAuthorIndexField).forEach(function (oneBasedIndex) {
        var idx = oneBasedIndex - 1;
        if (authors[idx]) boldSet[authors[idx].rawKey] = true;
      });
    } else {
      boldSet[nameToKey("Pan, Guangjin")] = true;
      boldSet[nameToKey("Guangjin Pan")] = true;
    }

    var maxAuthorsToShow = 6;
    var indices = authors.map(function (_, idx) { return idx; });
    var needsEtAl = authors.length > maxAuthorsToShow;
    var indicesToShow = indices;

    if (needsEtAl) {
      indicesToShow = [0, 1, 2].filter(function (idx) { return idx < authors.length; });
      var corrIndex = -1;
      for (var ai = 0; ai < authors.length; ai++) {
        if (correspondingSet[authors[ai].rawKey]) {
          corrIndex = ai;
          break;
        }
      }
      if (corrIndex >= 0 && indicesToShow.indexOf(corrIndex) === -1) {
        indicesToShow.push(corrIndex);
        indicesToShow.sort(function (a, b) { return a - b; });
      }
    }

    var renderedAuthors = indicesToShow
      .map(function (idx) {
        var a = authors[idx];
        var isBold = !!boldSet[a.rawKey];
        var isCorr = !!correspondingSet[a.rawKey];
        var display = escapeHtml(a.formatted);
        if (isCorr) display = display + "*";
        if (isBold) display = "<strong>" + display + "</strong>";
        return display;
      })
      .filter(Boolean);

    var authorText = renderedAuthors.join(", ");
    if (needsEtAl) authorText = (authorText ? authorText + ", " : "") + "et al.";
    var safeAuthorText = authorText;

    var title = f.title || "";
    var venue = f.journal || f.booktitle || "";
    var volume = f.volume || "";
    var number = f.number || "";
    var pages = f.pages || "";
    var year = f.year || "";

    var parts = [];
    if (safeAuthorText) parts.push(safeAuthorText);
    if (title) parts.push("&quot;" + escapeHtml(title) + ",&quot;");
    if (venue) parts.push("<em>" + escapeHtml(venue) + "</em>");
    if (volume) parts.push("vol. " + escapeHtml(volume));
    if (number) parts.push("no. " + escapeHtml(number));
    if (pages) parts.push("pp. " + escapeHtml(pages));
    if (year) parts.push(escapeHtml(year));

    return parts.join(", ") + ".";
  }

  function renderBibtexCitations() {
    var nodes = document.querySelectorAll(".bibtex-citation[data-bib-src]");
    for (var i = 0; i < nodes.length; i++) {
      (function (node) {
        var src = node.getAttribute("data-bib-src");
        var key = (node.getAttribute("data-bib-key") || "").trim();
        if (!src) return;
        fetchBib(src)
          .then(function (text) {
            if (key) {
              var entries = parseBibtexEntries(text || "");
              var selectedBlock = getBibEntryByKey(entries, key);
              var selected = selectedBlock ? selectedBlock.entry : null;
              if (selected && selectedBlock && selectedBlock.meta) selected.meta = selectedBlock.meta;
              var htmlByKey = renderBibtexCitation(selected);
              if (!htmlByKey) throw new Error("Parse failed");
              node.innerHTML = htmlByKey;
              return;
            }

            var firstEntry = parseBibtex(text || "");
            var html = renderBibtexCitation(firstEntry);
            if (!html) throw new Error("Parse failed");
            node.innerHTML = html;
          })
          .catch(function () {
            node.textContent = "Citation unavailable.";
          });
      })(nodes[i]);
    }
  }

  function copyText(text) {
    if (navigator.clipboard && window.isSecureContext) {
      return navigator.clipboard.writeText(text);
    }

    var textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.setAttribute("readonly", "");
    textarea.style.position = "fixed";
    textarea.style.left = "-9999px";
    textarea.style.top = "0";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();

    try {
      document.execCommand("copy");
    } finally {
      document.body.removeChild(textarea);
    }

    return Promise.resolve();
  }

  document.addEventListener("click", function (event) {
    var button = event.target && event.target.closest ? event.target.closest("button.bibtex-copy") : null;
    if (!button) return;

    var container = button.closest("li") || button.parentElement || document;
    var bibElement = container.querySelector(".bibtex-text");
    var bibtex = "";
    if (bibElement) {
      if (bibElement.tagName === "TEXTAREA") {
        bibtex = bibElement.value;
      } else {
        bibtex = bibElement.textContent;
      }
    }
    bibtex = (bibtex || "").trim().replace(/\\n/g, "\n");

    var originalText = button.textContent;
    if (bibtex) {
      copyText(bibtex)
        .then(function () {
          button.textContent = "Copied";
          window.setTimeout(function () {
            button.textContent = originalText;
          }, 1200);
        })
        .catch(function () {
          button.textContent = "Copy failed";
          window.setTimeout(function () {
            button.textContent = originalText;
          }, 1200);
        });
      return;
    }

    var bibSrc = button.getAttribute("data-bib-src");
    if (!bibSrc) return;
    var bibKey = (button.getAttribute("data-bib-key") || "").trim();

    button.textContent = "Loading";
    fetchBib(bibSrc)
      .then(function (text) {
        var fetched = (text || "").trim();
        if (!fetched) throw new Error("Empty BibTeX");

        if (bibKey) {
          var entries = parseBibtexEntries(fetched);
          var selectedBlock = getBibEntryByKey(entries, bibKey);
          var selectedRaw = selectedBlock ? selectedBlock.raw : "";
          selectedRaw = (selectedRaw || "").trim();
          if (!selectedRaw) throw new Error("BibTeX key not found");
          return copyText(selectedRaw);
        }

        return copyText(fetched);
      })
      .then(function () {
        button.textContent = "Copied";
        window.setTimeout(function () {
          button.textContent = originalText;
        }, 1200);
      })
      .catch(function () {
        button.textContent = "Copy failed";
        window.setTimeout(function () {
          button.textContent = originalText;
        }, 1200);
      });
  });

  renderBibtexCitations();
})();
</script>
