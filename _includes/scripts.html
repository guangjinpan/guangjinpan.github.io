<script src="{{ "/assets/js/main.min.js" | relative_url }}"></script>
<script>
(function () {
  var bibCache = {};

  function copyText(text) {
    if (navigator.clipboard && window.isSecureContext) {
      return navigator.clipboard.writeText(text);
    }

    var textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.setAttribute("readonly", "");
    textarea.style.position = "fixed";
    textarea.style.left = "-9999px";
    textarea.style.top = "0";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();

    try {
      document.execCommand("copy");
    } finally {
      document.body.removeChild(textarea);
    }

    return Promise.resolve();
  }

  document.addEventListener("click", function (event) {
    var button = event.target && event.target.closest ? event.target.closest("button.bibtex-copy") : null;
    if (!button) return;

    var container = button.closest("li") || button.parentElement || document;
    var bibElement = container.querySelector(".bibtex-text");
    var bibtex = "";
    if (bibElement) {
      if (bibElement.tagName === "TEXTAREA") {
        bibtex = bibElement.value;
      } else {
        bibtex = bibElement.textContent;
      }
    }
    bibtex = (bibtex || "").trim().replace(/\\n/g, "\n");

    var originalText = button.textContent;
    if (bibtex) {
      copyText(bibtex)
        .then(function () {
          button.textContent = "Copied";
          window.setTimeout(function () {
            button.textContent = originalText;
          }, 1200);
        })
        .catch(function () {
          button.textContent = "Copy failed";
          window.setTimeout(function () {
            button.textContent = originalText;
          }, 1200);
        });
      return;
    }

    var bibSrc = button.getAttribute("data-bib-src");
    if (!bibSrc) return;

    button.textContent = "Loading";
    var fetchPromise = bibCache[bibSrc]
      ? Promise.resolve(bibCache[bibSrc])
      : fetch(bibSrc)
          .then(function (response) {
            if (!response.ok) throw new Error("Fetch failed");
            return response.text();
          })
          .then(function (text) {
            bibCache[bibSrc] = text;
            return text;
          });

    fetchPromise
      .then(function (text) {
        var fetchedBibtex = (text || "").trim();
        if (!fetchedBibtex) throw new Error("Empty BibTeX");
        return copyText(fetchedBibtex);
      })
      .then(function () {
        button.textContent = "Copied";
        window.setTimeout(function () {
          button.textContent = originalText;
        }, 1200);
      })
      .catch(function () {
        button.textContent = "Copy failed";
        window.setTimeout(function () {
          button.textContent = originalText;
        }, 1200);
      });
  });
})();
</script>
